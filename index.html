<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Shark Attack Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
</head>
<body>
    <div id="loader">Učitavanje podataka...</div>

    <div class="container">
        <header>
            <div class="logo">
                <h1>SHARK<span>STATS</span></h1>
                <p>Interaktivna analiza napada (1900 - 2018)</p>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <label>Minimalna godina: <span id="yearVal">1900</span></label>
                    <input type="range" id="yearFilter" min="1900" max="2018" value="1900">
                </div>

                <div class="control-group button-control">
                    <button id="playBtn" class="btn-play">▶ Pokreni animaciju</button>
                </div>
            </div>
        </header>

        <div id="statsPanel" class="centered-range-header">
            <h2>Statistika za raspon <span id="rangeLabel">(1900 - 2018)</span></h2>
        </div>

        <div class="dashboard">
            <div class="card main-map">
                <h3>Globalna karta napada</h3>
                <div id="mapDiv"></div>
            </div>

            <div class="card pie-card">
                <h3>Stopa fatalnosti</h3>
                <canvas id="pieChart"></canvas>
            </div>

            <div class="card demo-card">
                <h3>Demografija žrtava (Dob i Spol)</h3>
                <canvas id="demographicsChart"></canvas>
            </div>

            <div class="card country-selector-card">
                <h3>Usporedba država</h3>
                <p class="selector-instruction">Označi do 3 države za usporedni trend:</p>
                <div id="countryCheckboxContainer" class="country-checkbox-list">
                </div>
            </div>

            <div class="card trend-card">
                <h3>Trend napada kroz vrijeme</h3>
                <canvas id="lineChart"></canvas>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
